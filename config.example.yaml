# RathausRot – Beispielkonfiguration
# Kopiere diese Datei nach config.yaml und passe die Werte an.
# WICHTIG: config.yaml enthält Secrets – niemals committen!

matrix:
  homeserver: "https://matrix.org"
  username: "@dein-bot:matrix.org"
  # access_token wird vom Setup-Wizard automatisch eingetragen
  access_token: ""
  room_id: "!raum-id:matrix.org"

openrouter:
  api_key: "sk-or-..."
  # Empfohlen: anthropic/claude-sonnet-4 (gutes Preis-Leistungs-Verhältnis)
  model: "anthropic/claude-sonnet-4"
  max_tokens: 1024
  # Eigener System-Prompt (leer = Default nutzen)
  system_prompt: ""

scraper:
  # URL des Ratsinfo-Systems deiner Stadt
  ratsinfo_url: "https://ratsinfo.example.de/bi/"
  # Maximale Seitenanzahl bei PDF-Extraktion
  max_pdf_pages: 10
  # Timeout in Sekunden für HTTP-Anfragen
  request_timeout: 30
  # Keyword-Filter (leer = kein Filter, alle Items werden analysiert)
  # Nur Items deren Titel/Text eines dieser Keywords enthält werden verarbeitet
  keywords: []
  # robots.txt respektieren (true = Standard, false = Prüfung überspringen)
  # Auf false setzen, wenn das Ratsinfo-System öffentliche Daten sperrt
  respect_robots_txt: true

bot:
  # Intervall in Stunden (168 = 1 Woche)
  interval_hours: 168
  # Wochentag für den Bericht ("monday", "tuesday", ..., "daily" für täglich)
  schedule_day: "monday"
  schedule_time: "08:00"
  # Deine Partei (für den Analyse-Kontext)
  party: "SPD"
  log_level: "INFO"
  log_file: "rathausrot.log"
  # Relevanz-Schwellenwert (1-5, 1 = alles posten, 5 = nur sehr relevante Items)
  relevance_threshold: 1
  # Health-Check HTTP-Port (0 = deaktiviert)
  healthcheck_port: 0
  # Matrix-Benutzer, die Chat-Befehle ausführen dürfen (z.B. !scrape).
  # Leer lassen, um alle Mitglieder des Raums zuzulassen.
  allowed_users:
    - "@admin:matrix.org"
    - "@fraktionsmitglied:matrix.org"
